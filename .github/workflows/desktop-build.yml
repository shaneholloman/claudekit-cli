name: Desktop Build

on:
  # Release builds: always run on desktop tags (no path filter)
  push:
    tags:
      - 'desktop-v*'
  # Dev builds: only when desktop-related files change
  pull_request:
    paths:
      - '.githooks/**'
      - 'package.json'
      - 'scripts/validate-desktop-bundle-config.ts'
      - 'src-tauri/**'
      - 'src/commands/app/**'
      - 'src/ui/**'
      - 'src/domains/desktop/**'
      - 'src/domains/versioning/checking/**'
      - 'src/domains/help/commands/app-command-help.ts'
      - 'src/types/desktop.ts'
      - 'scripts/generate-desktop-release-manifest.ts'
      - 'scripts/sync-desktop-bundle-config.ts'
      - '.github/workflows/desktop-build.yml'
  workflow_dispatch:

jobs:
  check:
    name: PR Typecheck Gate
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsecret-1-dev

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Preflight desktop bundle sync script
        run: bun run desktop:check-sync

      - name: Validate desktop bundle config
        run: bun run desktop:validate-config

      - name: Validate desktop icon source
        run: bun run desktop:validate-icons

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Rust typecheck
        working-directory: src-tauri
        run: cargo check

      - name: TS typecheck
        run: bun run typecheck

      - name: UI build (strict TSC)
        run: bun run ui:build

      - name: Lint
        run: bun run lint

      - name: Tests
        run: bun test

  pr-windows-build:
    name: PR Windows Bundle Check
    runs-on: windows-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Preflight desktop bundle sync script
        run: bun run desktop:check-sync

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Validate desktop bundle config
        run: bun run desktop:validate-config

      - name: Validate desktop icon source
        run: bun run desktop:validate-icons

      - name: Build Tauri app on Windows
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ''

  build:
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsecret-1-dev

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Sync desktop bundle version from release tag
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        run: bun run desktop:sync-version "${{ github.ref_name }}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Validate desktop bundle config
        run: bun run desktop:validate-config

      - name: Validate desktop icon source
        run: bun run desktop:validate-icons

      # tauri-action runs beforeBuildCommand (bun run ui:build) automatically
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          # tagName/releaseName only set on desktop-v* tags — see release job below

      - name: Verify macOS bundle version matches release tag
        if: matrix.platform == 'macos-latest' && startsWith(github.ref, 'refs/tags/desktop-v')
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#desktop-v}"
          APP_MATCHES="$(find src-tauri/target/universal-apple-darwin/release/bundle -path '*macos/*.app' -type d | sort)"
          APP_COUNT="$(printf '%s\n' "$APP_MATCHES" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [ "$APP_COUNT" -ne 1 ]; then
            echo "Expected exactly one macOS app bundle for version verification, found $APP_COUNT"
            printf '%s\n' "$APP_MATCHES"
            exit 1
          fi
          APP_PATH="$APP_MATCHES"

          ACTUAL_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_PATH/Contents/Info.plist")"
          if [ "$ACTUAL_VERSION" != "$VERSION" ]; then
            echo "Desktop bundle version mismatch: expected $VERSION, got $ACTUAL_VERSION"
            exit 1
          fi

      - name: Prepare portable desktop assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p desktop-portable

          case "${{ matrix.platform }}" in
            macos-latest)
              APP_PATH="$(find src-tauri/target/universal-apple-darwin -type d -name '*.app' | head -1)"
              if [ -z "$APP_PATH" ]; then
                echo "Portable macOS app bundle not found"
                exit 1
              fi
              ditto -c -k --keepParent "$APP_PATH" \
                "desktop-portable/claudekit-control-center_macos-universal.app.zip"
              ;;
            ubuntu-22.04)
              APPIMAGE_PATH="$(find src-tauri/target -type f -name '*.AppImage' | head -1)"
              if [ -z "$APPIMAGE_PATH" ]; then
                echo "Portable Linux AppImage not found"
                exit 1
              fi
              cp "$APPIMAGE_PATH" \
                "desktop-portable/claudekit-control-center_linux-x86_64.AppImage"
              ;;
            windows-latest)
              EXE_PATH="src-tauri/target/release/claudekit-control-center.exe"
              if [ ! -f "$EXE_PATH" ]; then
                echo "Portable Windows executable not found at $EXE_PATH"
                exit 1
              fi
              cp "$EXE_PATH" \
                "desktop-portable/claudekit-control-center_windows-x86_64-portable.exe"
              ;;
          esac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            desktop-portable/*
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.app

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Install release job dependencies
        run: bun install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display downloaded artifacts
        run: find artifacts/ -type f | sort

      - name: Detect release channel
        id: channel
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *"-dev."* ]]; then
            echo "is_dev=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_dev=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release assets
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#desktop-v}"
          mkdir -p release-assets

          DMG_PATH="$(find artifacts/ -type f -name '*.dmg' | head -1)"
          if [ -z "$DMG_PATH" ]; then
            echo "Desktop DMG asset not found"
            exit 1
          fi
          cp "$DMG_PATH" release-assets/

          MSI_PATH="$(find artifacts/ -type f -name '*.msi' | head -1)"
          if [ -z "$MSI_PATH" ]; then
            echo "Desktop MSI asset not found"
            exit 1
          fi
          cp "$MSI_PATH" release-assets/

          DEB_PATH="$(find artifacts/ -type f -name '*.deb' | head -1)"
          if [ -z "$DEB_PATH" ]; then
            echo "Desktop DEB asset not found"
            exit 1
          fi
          cp "$DEB_PATH" release-assets/

          cp "$(find artifacts/ -type f -name 'claudekit-control-center_macos-universal.app.zip' | head -1)" \
            "release-assets/claudekit-control-center_${VERSION}_macos-universal.app.zip"
          cp "$(find artifacts/ -type f -name 'claudekit-control-center_linux-x86_64.AppImage' | head -1)" \
            "release-assets/claudekit-control-center_${VERSION}_linux-x86_64.AppImage"
          cp "$(find artifacts/ -type f -name 'claudekit-control-center_windows-x86_64-portable.exe' | head -1)" \
            "release-assets/claudekit-control-center_${VERSION}_windows-x86_64-portable.exe"

          if find artifacts/ -type f -name '*.exe' ! -name 'claudekit-control-center_windows-x86_64-portable.exe' | grep -q .; then
            cp "$(find artifacts/ -type f -name '*.exe' ! -name 'claudekit-control-center_windows-x86_64-portable.exe' | head -1)" release-assets/
          fi

          find release-assets/ -type f | sort

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#desktop-v}"
          IS_DEV="${{ steps.channel.outputs.is_dev }}"

          ASSETS=()
          while IFS= read -r f; do
            ASSETS+=("$f")
          done < <(find release-assets/ -type f | sort)

          if [ "$IS_DEV" = "true" ]; then
            gh release create "$TAG" \
              --title "ClaudeKit Desktop v${VERSION} (dev)" \
              --generate-notes \
              --prerelease \
              "${ASSETS[@]}"
          else
            gh release create "$TAG" \
              --title "ClaudeKit Desktop v${VERSION}" \
              --generate-notes \
              "${ASSETS[@]}"
          fi

      - name: Generate desktop-manifest.json for desktop distribution
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh api "repos/${{ github.repository }}/releases/tags/${TAG}" > release.json
          bun scripts/generate-desktop-release-manifest.ts release.json > desktop-manifest.json

          gh release upload "$TAG" desktop-manifest.json --clobber

          # Route manifest to channel pointer based on detected channel
          if [ "${{ steps.channel.outputs.is_dev }}" = "true" ]; then
            # Dev channel pointer
            gh release create "desktop-latest-dev" \
              --title "Desktop Latest Dev (distribution manifest)" \
              --notes "Auto-maintained by CI. Points to the latest dev desktop distribution manifest." \
              --latest=false 2>/dev/null || true
            gh release upload "desktop-latest-dev" desktop-manifest.json --clobber
          else
            # Stable channel pointer (unchanged behavior)
            gh release create "desktop-latest" \
              --title "Desktop Latest (distribution manifest)" \
              --notes "Auto-maintained by CI. Points to the latest desktop distribution manifest." \
              --latest=false 2>/dev/null || true
            gh release upload "desktop-latest" desktop-manifest.json --clobber
          fi
